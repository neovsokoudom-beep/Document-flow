<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Document Entry and Search</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f5f7fb; color: #111; }
    .wrap { max-width: 900px; margin: 20px auto; padding: 0 12px; }
    .card { background: #fff; border-radius: 10px; padding: 14px; margin-bottom: 14px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    h2 { margin: 0 0 10px; font-size: 18px; }
    label { display: block; margin-top: 8px; font-size: 13px; color: #666; }
    input, select { width: 100%; box-sizing: border-box; border: 1px solid #ddd; border-radius: 8px; padding: 9px; font-size: 14px; }
    .row { display: flex; gap: 8px; }
    .row > div { flex: 1; }
    .btns { display: flex; gap: 8px; margin-top: 10px; }
    button { border: 0; border-radius: 8px; padding: 10px 12px; cursor: pointer; font-weight: 700; }
    .primary { background: #0b74de; color: #fff; }
    .secondary { background: #e8edf7; color: #0b74de; }
    .muted { color: #666; font-size: 13px; }
    ul { list-style: none; padding: 0; margin: 10px 0 0; }
    li { padding: 10px 0; border-bottom: 1px solid #eee; }
    @media (max-width: 700px) { .row { flex-direction: column; } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h2>Document Entry</h2>
      <form id="entryForm">
        <label>Title</label>
        <input id="title" required placeholder="Purchase Request - Printer" />

        <label>Document Type</label>
        <select id="document_type" required>
          <option value="Purchase">Purchase</option>
          <option value="Contract">Contract</option>
          <option value="Invoice">Invoice</option>
          <option value="Other">Other</option>
        </select>

        <div class="row">
          <div>
            <label>Date</label>
            <input id="date" type="date" required />
          </div>
          <div>
            <label>Amount</label>
            <input id="amount" type="number" step="0.01" placeholder="1250.50" />
          </div>
        </div>

        <label>Reference Number</label>
        <input id="reference_number" placeholder="PR-2026-0042" />

        <label>Tags (comma separated)</label>
        <input id="tags" placeholder="printer,office" />

        <div class="btns">
          <button class="primary" type="submit" id="submitBtn">Submit</button>
          <button class="secondary" type="button" id="clearBtn">Clear</button>
        </div>
        <div class="muted" id="entryStatus"></div>
      </form>
    </div>

    <div class="card">
      <h2>Search Documents</h2>
      <div class="row">
        <div style="flex:2">
          <label>Quick Search</label>
          <input id="query" placeholder="Search by ID, title, reference" />
        </div>
        <div>
          <label>Type</label>
          <select id="fType">
            <option value="">All</option>
            <option value="Purchase">Purchase</option>
            <option value="Contract">Contract</option>
            <option value="Invoice">Invoice</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div>
          <label>Status</label>
          <select id="fStatus">
            <option value="">All</option>
            <option value="Submitted">Submitted</option>
          </select>
        </div>
      </div>

      <div class="row">
        <div>
          <label>Date From</label>
          <input id="fFrom" type="date" />
        </div>
        <div>
          <label>Date To</label>
          <input id="fTo" type="date" />
        </div>
      </div>

      <div class="btns">
        <button class="primary" type="button" id="searchBtn">Search</button>
      </div>
      <div class="muted" id="searchStatus"></div>
      <ul id="results"></ul>
    </div>
  </div>

  <script>
    var DRAFT_KEY = 'documentAppDraftV1';

    function esc(v) {
      return String(v == null ? '' : v)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    function getEntryData() {
      return {
        title: document.getElementById('title').value.trim(),
        document_type: document.getElementById('document_type').value,
        date: document.getElementById('date').value,
        amount: document.getElementById('amount').value,
        reference_number: document.getElementById('reference_number').value.trim(),
        tags: document.getElementById('tags').value.trim()
      };
    }

    function saveDraft() {
      try {
        localStorage.setItem(DRAFT_KEY, JSON.stringify(getEntryData()));
      } catch (e) {}
    }

    function restoreDraft() {
      try {
        var raw = localStorage.getItem(DRAFT_KEY);
        if (!raw) return;
        var d = JSON.parse(raw);
        document.getElementById('title').value = d.title || '';
        document.getElementById('document_type').value = d.document_type || 'Purchase';
        document.getElementById('date').value = d.date || '';
        document.getElementById('amount').value = d.amount || '';
        document.getElementById('reference_number').value = d.reference_number || '';
        document.getElementById('tags').value = d.tags || '';
      } catch (e) {}
    }

    async function postApi(action, data) {
      var res = await fetch(window.location.href.split('?')[0], {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: action, data: data })
      });
      return await res.json();
    }

    document.getElementById('entryForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      var submitBtn = document.getElementById('submitBtn');
      var status = document.getElementById('entryStatus');
      submitBtn.disabled = true;
      status.textContent = 'Submitting...';

      try {
        var payload = getEntryData();
        var result = await postApi('submit', payload);
        if (!result.success) throw new Error(result.error || 'Submit failed');

        status.innerHTML = 'Saved. Document ID: <b>' + esc(result.document_id) + '</b>';
        document.getElementById('entryForm').reset();
        localStorage.removeItem(DRAFT_KEY);
        runSearch();
      } catch (err) {
        status.textContent = err.message;
      } finally {
        submitBtn.disabled = false;
      }
    });

    document.getElementById('clearBtn').addEventListener('click', function() {
      document.getElementById('entryForm').reset();
      document.getElementById('entryStatus').textContent = '';
      localStorage.removeItem(DRAFT_KEY);
    });

    async function runSearch() {
      var status = document.getElementById('searchStatus');
      var list = document.getElementById('results');
      list.innerHTML = '';
      status.textContent = 'Searching...';

      try {
        var query = document.getElementById('query').value.trim();
        var filters = {
          document_type: document.getElementById('fType').value,
          status: document.getElementById('fStatus').value,
          date_from: document.getElementById('fFrom').value,
          date_to: document.getElementById('fTo').value
        };

        var result = await postApi('search', { query: query, filters: filters });
        var rows = result && result.results ? result.results : [];

        status.textContent = rows.length ? ('Found ' + rows.length + ' record(s)') : 'No results';

        for (var i = 0; i < rows.length; i++) {
          var r = rows[i];
          var li = document.createElement('li');
          li.innerHTML =
            '<div><b>' + esc(r.document_id) + '</b> - ' + esc(r.title) + '</div>' +
            '<div class="muted">' + esc(r.document_type) + ' | ' + esc(r.date) + ' | ' + esc(r.status) + ' | Ref: ' + esc(r.reference_number || '-') + '</div>';
          list.appendChild(li);
        }
      } catch (err) {
        status.textContent = err.message;
      }
    }

    ['title', 'document_type', 'date', 'amount', 'reference_number', 'tags'].forEach(function(id) {
      var el = document.getElementById(id);
      el.addEventListener('input', saveDraft);
      el.addEventListener('change', saveDraft);
    });

    ['searchBtn', 'fType', 'fStatus', 'fFrom', 'fTo'].forEach(function(id) {
      document.getElementById(id).addEventListener('click', runSearch);
      document.getElementById(id).addEventListener('change', runSearch);
    });

    document.getElementById('query').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        runSearch();
      }
    });

    restoreDraft();
    runSearch();
  </script>
</body>
</html>
