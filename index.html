<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Document Entry and Search</title>
  <style>
    :root{--accent:#0b74de;--muted:#666;--bg:#f7f9fb;--card:#fff}
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,"Noto Sans",Arial;margin:0;background:var(--bg);color:#111}
    .container{max-width:900px;margin:16px auto;padding:12px}
    .card{background:var(--card);border-radius:10px;padding:12px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
    h1{font-size:18px;margin:0 0 8px}
    label{display:block;font-size:13px;margin:8px 0 4px;color:var(--muted)}
    input[type=text], input[type=date], input[type=number], select {
      width:100%;padding:10px;border:1px solid #e3e6ea;border-radius:8px;font-size:15px;box-sizing:border-box;
    }
    .row{display:flex;gap:8px}
    .row .col{flex:1}
    .actions{display:flex;gap:8px;margin-top:10px}
    button{background:var(--accent);color:#fff;border:0;padding:10px 14px;border-radius:8px;font-weight:600;cursor:pointer}
    button.secondary{background:#e9eef7;color:var(--accent);border:1px solid #d6e6fb}
    .small{font-size:13px;color:var(--muted)}
    .results{list-style:none;padding:0;margin:0}
    .result{display:flex;justify-content:space-between;align-items:center;padding:10px;border-bottom:1px solid #f0f2f4;gap:8px}
    .meta{font-size:13px;color:var(--muted)}
    .filters{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
    @media(min-width:720px){ .row{flex-wrap:nowrap} .container{padding:20px} }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>បញ្ចូលឯកសារ Document Entry</h1>
      <p class="small">Type document details and submit. បំពេញព័ត៌មានឯកសារ ហើយចុច Submit។</p>

      <form id="entryForm">
        <label for="title">Title សារសំខាន់</label>
        <input id="title" name="title" type="text" required placeholder="Purchase Request - Printer">

        <label for="document_type">Document Type ប្រភេទឯកសារ</label>
        <select id="document_type" name="document_type" required>
          <option value="Purchase">Purchase</option>
          <option value="Contract">Contract</option>
          <option value="Invoice">Invoice</option>
          <option value="Other">Other</option>
        </select>

        <div class="row">
          <div class="col">
            <label for="date">Date ថ្ងៃទី</label>
            <input id="date" name="date" type="date" required>
          </div>
          <div class="col">
            <label for="amount">Amount ចំនួន</label>
            <input id="amount" name="amount" type="number" step="0.01" placeholder="1250.50">
          </div>
        </div>

        <label for="reference_number">Reference Number លេខយោង</label>
        <input id="reference_number" name="reference_number" type="text" placeholder="PR-2026-0042">

        <label for="tags">Tags ស្លាក (comma separated)</label>
        <input id="tags" name="tags" type="text" placeholder="printer,office">

        <div class="actions">
          <button type="submit" id="submitBtn">Submit ដាក់ស្នើ</button>
          <button type="button" class="secondary" id="clearBtn">Clear លុប</button>
        </div>

        <p id="entryStatus" class="small" style="margin-top:8px"></p>
      </form>
    </div>

    <div class="card">
      <h1>Search ស្វែងរកឯកសារ</h1>
      <div style="display:flex;gap:8px;align-items:center">
        <input id="quickSearch" type="text" placeholder="Quick search by ID, title, reference" style="flex:1;padding:10px;border-radius:8px;border:1px solid #e3e6ea">
        <button id="searchBtn" type="button">Search ស្វែងរក</button>
      </div>

      <div class="filters" style="margin-top:10px">
        <select id="filterType">
          <option value="">All Types</option>
          <option value="Purchase">Purchase</option>
          <option value="Contract">Contract</option>
          <option value="Invoice">Invoice</option>
          <option value="Other">Other</option>
        </select>

        <select id="filterStatus">
          <option value="">All Status</option>
          <option value="Submitted">Submitted</option>
        </select>

        <input id="dateFrom" type="date" style="padding:8px;border-radius:8px;border:1px solid #e3e6ea">
        <input id="dateTo" type="date" style="padding:8px;border-radius:8px;border:1px solid #e3e6ea">
      </div>

      <ul id="results" class="results" style="margin-top:12px"></ul>
      <p id="searchStatus" class="small" style="margin-top:8px"></p>
    </div>
  </div>

  <script>
    var API_URL = window.location.href.split('?')[0];
    var DRAFT_KEY = 'docFlowDraftV1';

    var entryForm = document.getElementById('entryForm');
    var submitBtn = document.getElementById('submitBtn');
    var entryStatus = document.getElementById('entryStatus');
    var clearBtn = document.getElementById('clearBtn');

    var searchBtn = document.getElementById('searchBtn');
    var resultsEl = document.getElementById('results');
    var searchStatus = document.getElementById('searchStatus');

    function esc(v) {
      return String(v == null ? '' : v)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/\"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function getFormData() {
      return {
        title: document.getElementById('title').value.trim(),
        document_type: document.getElementById('document_type').value,
        date: document.getElementById('date').value,
        amount: document.getElementById('amount').value || '',
        reference_number: document.getElementById('reference_number').value.trim(),
        tags: document.getElementById('tags').value.trim()
      };
    }

    function saveDraft() {
      try {
        localStorage.setItem(DRAFT_KEY, JSON.stringify(getFormData()));
      } catch (e) {}
    }

    function restoreDraft() {
      try {
        var raw = localStorage.getItem(DRAFT_KEY);
        if (!raw) return;
        var d = JSON.parse(raw);
        document.getElementById('title').value = d.title || '';
        document.getElementById('document_type').value = d.document_type || 'Purchase';
        document.getElementById('date').value = d.date || '';
        document.getElementById('amount').value = d.amount || '';
        document.getElementById('reference_number').value = d.reference_number || '';
        document.getElementById('tags').value = d.tags || '';
      } catch (e) {}
    }

    function clearDraft() {
      try { localStorage.removeItem(DRAFT_KEY); } catch (e) {}
    }

    entryForm.addEventListener('submit', async function(e) {
      e.preventDefault();
      submitBtn.disabled = true;
      entryStatus.textContent = 'Submitting...';

      try {
        var payload = getFormData();
        if (!payload.title || !payload.document_type || !payload.date) {
          throw new Error('Title, type, and date are required.');
        }

        var res = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'docSubmit', data: payload })
        });

        var data = await res.json();
        if (data && data.success) {
          entryStatus.innerHTML = 'Submitted ✓ Document ID: <strong>' + esc(data.document_id || '-') + '</strong>';
          entryForm.reset();
          clearDraft();
          await runSearch();
        } else {
          entryStatus.textContent = 'Submit failed: ' + ((data && data.error) || 'Server error');
        }
      } catch (err) {
        entryStatus.textContent = 'Error: ' + err.message;
      } finally {
        submitBtn.disabled = false;
      }
    });

    clearBtn.addEventListener('click', function() {
      entryForm.reset();
      clearDraft();
      entryStatus.textContent = '';
    });

    async function runSearch() {
      searchBtn.disabled = true;
      searchStatus.textContent = 'Searching...';
      resultsEl.innerHTML = '';

      var query = document.getElementById('quickSearch').value.trim();
      var filters = {
        document_type: document.getElementById('filterType').value,
        status: document.getElementById('filterStatus').value,
        date_from: document.getElementById('dateFrom').value,
        date_to: document.getElementById('dateTo').value
      };

      try {
        var res = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'docSearch', data: { query: query, filters: filters } })
        });

        var data = await res.json();
        var rows = data && Array.isArray(data.results) ? data.results : [];

        if (!rows.length) {
          searchStatus.textContent = 'No results found';
        } else {
          searchStatus.textContent = 'Showing ' + rows.length + ' results';
        }

        for (var i = 0; i < rows.length; i++) {
          var r = rows[i];
          var li = document.createElement('li');
          li.className = 'result';
          li.innerHTML =
            '<div>' +
              '<div><strong>' + esc(r.document_id || '-') + '</strong> — ' + esc(r.title || '') + '</div>' +
              '<div class="meta">' + esc(r.document_type || '') + ' • ' + esc(r.date || '') + ' • ' + esc(r.status || '') + '</div>' +
            '</div>' +
            '<div class="meta">' + esc(r.reference_number || '-') + '</div>';
          resultsEl.appendChild(li);
        }
      } catch (err) {
        searchStatus.textContent = 'Search failed: ' + err.message;
      } finally {
        searchBtn.disabled = false;
      }
    }

    searchBtn.addEventListener('click', runSearch);
    document.getElementById('quickSearch').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        runSearch();
      }
    });

    ['title', 'document_type', 'date', 'amount', 'reference_number', 'tags'].forEach(function(id) {
      var el = document.getElementById(id);
      el.addEventListener('input', saveDraft);
      el.addEventListener('change', saveDraft);
    });

    ['filterType', 'filterStatus', 'dateFrom', 'dateTo'].forEach(function(id) {
      document.getElementById(id).addEventListener('change', runSearch);
    });

    restoreDraft();
    runSearch();
  </script>
</body>
</html>
